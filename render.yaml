# Render Blueprint — one-click deploy of the whole app (frontend + backend) as a
# single Docker web service on the free tier. Render sets $PORT automatically and
# the container's CMD binds to it.
#
# Deploy: Render dashboard -> New -> Blueprint -> connect this repo -> Apply.
services:
  - type: web
    name: ai-hiring-platform
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      # Writable, container-local paths (free tier disk is ephemeral).
      - key: STORAGE_DIR
        value: /app/runtime/storage
      - key: DATABASE_URL
        value: sqlite:////app/runtime/hiring_platform.db
      # Enable Gemini reasoning by setting these in the Render dashboard (leave
      # unset to run the deterministic engine):
      # - key: LLM_PROVIDER
      #   value: google
      # - key: GOOGLE_API_KEY
      #   sync: false
      # - key: LLM_MODEL
      #   value: gemini-2.0-flash
